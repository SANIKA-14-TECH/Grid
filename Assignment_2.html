<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       
        .fruitConatiner{
            display: grid;
            gap:10px;
            width: 400px;
            height: 300px;

        }
        .grapes{
            grid-column-start: 1;
            grid-column-end: 2;
            grid-row-start: 1;
            grid-row-end: 2;
            width: 100px;
            height: 100px;
            background-color: blueviolet;
        }
        .strawberry{
            grid-column-start: 2;
            grid-column-end: 3;
            grid-row-start: 1;
            grid-row-end: 2;
            width: 100px;
            height: 100px;
            background-color:rgb(234, 109, 109)
        }
        .watermelon{
            grid-column-start: 3;
            grid-column-end: 4;
            grid-row-start: 1;
            grid-row-end: 3;
            width: 200px;
            height: 210px;
            background-color:rgb(193, 18, 18)
        }
        .orange{
            grid-column-start: 1;
            grid-column-end: 3;
            grid-row-start: 2;
            grid-row-end: 3;
            width: 210px;
            height: 100px;
            background-color:rgb(251, 165, 43)
        }
        .papaya{
            grid-column-start: 1;
            grid-column-end: 3;
            grid-row-start: 3;
            grid-row-end: 4;
            width: 210px;
            height: 100px;
            background-color:rgb(184, 136, 4)
        }
        .pineapple{
            grid-column-start: 3;
            grid-column-end: 4;
            grid-row-start: 3;
            grid-row-end: 4;
            width: 200px;
            height: 100px;
            background-color:rgb(184, 136, 4)
        }
        

    </style>
</head>
<body>
   
    <div class="fruitConatiner">
        <div class="grapes"><img src="Assests/grapes.jfif" alt="" style="width: 100% ;height: 100%;"></div>
        <div class="strawberry"><img src="Assests/strawberry.jfif " alt="" style="width: 100% ;height: 100%;"></div>
        <div class="watermelon"><img src="Assests/watermelon.jpg" alt="" style="width: 100% ;height: 100%;"></div>
        <div class="orange"><img src="Assests/orange.jfif" alt="" style="width: 100% ;height: 100%;"></div>
        <div class="papaya"><img src="Assests/papaya.jfif" alt="" style="width: 100% ;height: 100%;"></div>
        <div class="pineapple"><img src="Assests/pineapple.jfif" alt="" style="width: 100% ;height: 100%;"></div>
    </div>
    
</body>
</html>
