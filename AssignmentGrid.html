<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: o;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: #f5f5f5;
            padding: 40px;
        }

        .container{
            display: grid;
            grid-template-columns: repeat(3,1fr);
            grid-auto-rows: 200px;
            gap: 20px;
        }

        .card{
            position: relative;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-size: cover;
            background-position: center;
        }

        .card span{
            font-size: 12px;
            letter-spacing: 1px;
        }

        .card1{
            background-image: url(Assests/winter.jfif)
        }
        .card2{
            grid-column: span 2;
            background-image: url(Assests/Instagram.jfif);
        }

        .card3{
            grid-column: span 2;
            background-image: url(Assests/Ocean.jfif);
        }

        .card4{
            background-image: url(Assests/Room.jfif)
        }
        .small{
            background: #333;
            height: 80px;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card card1">
            <h2>The winter of my discontent</h2>
            <span style="text-align: right;">READ POST</span>
        </div>

        <div class="card card2">
            <h2>Instagram is toxic but I keep posting</h2>
            <span style="text-align: right;">READ POST</span>
        </div>
        <div class="card card3">
            <h2>Throwing my phone into the ocean</h2>
            <span style="text-align: right;">READ POST</span>
        </div>

        <div class="card card4">
            <h2>I'm never leaving my room</h2>
            <span style="text-align: right;">READ POST</span>
        </div>

        <div class="card small" style="background-image: url(Assests/small.jfif);" >
            <h2>starig at the horizon thinking</h2>
        </div>

        <div class="card small" style="background-image: url(Assests/water.jfif);">
            <h2>This is water</h2>
        </div>

        <div class="card small" style="background-image: url(Assests/Chairs.jfif);">
            <h2>Table for one please</h2>
        </div>
    </div>
</body>
</html>
