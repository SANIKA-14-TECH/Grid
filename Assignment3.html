<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Responsive Image Gallery</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    .gallery {
      display: grid;

      /* Responsive columns */
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));

      gap: 10px;
    }

    .gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>

  <h2>Responsive Image Gallery</h2>

  <div class="gallery">

    <img src="https://tse1.mm.bing.net/th/id/OIP.DYgmUVAM3DsPrH77SPcrBwHaEo?pid=Api&P=0&h=180" alt="">

  </div>

</body>
</html>
