<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Responsive Card Grid</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
    }

    .card-container {
      display: grid;

      /* Responsive grid */
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));

      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
    }

    .card-content {
      padding: 15px;
    }

    .card-title {
      font-size: 18px;
      margin: 0 0 10px;
    }

    .card-description {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

  <h2>Responsive Card Grid</h2>

  <div class="card-container">

    <div class="card">
      <img src="https://tse3.mm.bing.net/th/id/OIP.eU0jCFoQvywCZensRXnL8wHaEo?pid=Api&P=0&h=180" alt="">
      <div class="card-content">
        <h3 class="card-title">Card Title 1</h3>
        <p class="card-description">This is a description for card 1.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://tse1.mm.bing.net/th/id/OIP.dsoOAX1HrO3FZz4G_LKcKgHaE7?pid=Api&P=0&h=180" alt="">
      <div class="card-content">
        <h3 class="card-title">Card Title 2</h3>
        <p class="card-description">This is a description for card 2.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://tse2.mm.bing.net/th/id/OIP.64UTG3JmPxGG3CMuI_Uc3QHaEo?pid=Api&P=0&h=180" alt="">
      <div class="card-content">
        <h3 class="card-title">Card Title 3</h3>
        <p class="card-description">This is a description for card 3.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://tse1.mm.bing.net/th/id/OIP.7iD6-4xujPbQ7d3uhV2ugQHaEK?pid=Api&P=0&h=180" alt="">
      <div class="card-content">
        <h3 class="card-title">Card Title 4</h3>
        <p class="card-description">This is a description for card 4.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://tse3.mm.bing.net/th/id/OIP.QLI6SPVnlnY7E5N0R4rLewHaHN?pid=Api&P=0&h=180" alt="">
      <div class="card-content">
        <h3 class="card-title">Card Title 5</h3>
        <p class="card-description">This is a description for card 5.</p>
      </div>
    </div>

  </div>

</body>
</html>
