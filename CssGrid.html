<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive CSS Grid</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body{
  min-height:100vh;
  background: linear-gradient(135deg,#7b2cbf,#c77dff);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 20px;
}

/* TOP HEADER */
.header{
  text-align:center;
  margin-bottom:40px;
}

.header h1{
  background:#1f6feb;
  color:white;
  padding:20px 40px;
  font-size:40px;
  letter-spacing:2px;
}

.header h2{
  background:#38bdf8;
  color:white;
  display:inline-block;
  padding:10px 25px;
  margin-top:10px;
  font-weight:bold;
}

/* LAYOUT WRAPPER */
.preview-wrapper{
  display:flex;
  align-items:center;
  gap:50px;
  flex-wrap:wrap;
  justify-content:center;
}

/* CARD STYLE */
.card{
  background:white;
  padding:15px;
  border-radius:8px;
  box-shadow:0 15px 25px rgba(0,0,0,0.3);
}

/* DESKTOP GRID */
.desktop{
  width:700px;
}

.desktop-grid{
  display:grid;
  grid-template-columns:200px 1fr;
  grid-template-rows:auto 1fr auto auto;
  gap:10px;
}
.card-desktop{
    width: 100px;
}
.navbar{
  grid-column:1 / -1;
  background:#b2f2e5;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

.sidebar{
  grid-row:2 / 4;
  background:#2ec4b6;
  padding:20px;
  text-align:center;
  font-weight:bold;
}

.main{
  background:#81ecec;
  padding:40px;
  text-align:center;
  font-weight:bold;
}

.contents{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.content{
  background:#95d5b2;
  padding:25px;
  text-align:center;
  font-weight:bold;
}

.footer{
  grid-column:1 / -1;
  background:#2d6a4f;
  color:white;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

/* MOBILE GRID PREVIEW */
.mobile{
  width:220px;
}

.mobile-grid{
  display:grid;
  gap:10px;
}

.mobile-grid div{
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.mobile .navbar{
    background:#b2f2e5;
}
.mobile .sidebar{
    background:#2ec4b6;
}
.mobile .main{
    background:#81ecec;
}
.mobile .content{
    background:#95d5b2;
}
.mobile .footer{
    background:#2d6a4f; color:white;
}

/* ARROW */
.arrow{
  font-size:60px;
  color:white;
}

/* RESPONSIVE */

</style>
</head>

<body>

<div class="header">
  <h1>RESPONSIVE CSS GRID</h1>
  <h2>ONLY HTML & CSS</h2>
</div>

<div class="preview-wrapper">

  <!-- Desktop Preview -->
  <div class="card desktop">
    <div class="desktop-grid">
      <div class="navbar">NAVBAR</div>
      <div class="sidebar">SIDEBAR</div>
      <div class="main">MAIN</div>

      <div class="contents">
        <div class="content">CONTENT 1</div>
        <div class="content">CONTENT 2</div>
        <div class="content">CONTENT 3</div>
      </div>

      <div class="footer">FOOTER</div>
    </div>
  </div>

  <div class="arrow">➜</div>

  <!-- Mobile Preview -->
  <div class="card mobile">
    <div class="mobile-grid">
      <div class="navbar">NAVBAR</div>
      <div class="sidebar">SIDEBAR</div>
      <div class="main">MAIN</div>
      <div class="content">CONTENT 1</div>
      <div class="content">CONTENT 2</div>
      <div class="content">CONTENT 3</div>
      <div class="footer">FOOTER</div>
    </div>
  </div>

</div>

</body>
</html>
